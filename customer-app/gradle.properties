# Project-wide Gradle settings.
# JVM arguments for the Gradle daemon.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Run Gradle tasks in parallel where possible.
org.gradle.parallel=true

# AndroidX is required for Jetpack Compose.
android.useAndroidX=true

# Kotlin code style for the official conventions.
kotlin.code.style=official

# Generate non-transitive R classes for faster, smaller builds.
android.nonTransitiveRClass=true
