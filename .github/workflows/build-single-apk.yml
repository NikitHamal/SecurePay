name: Build single APK

on:
  workflow_call:
    inputs:
      module:
        required: true
        type: string
      artifact:
        required: true
        type: string
    secrets:
      HMAC_SECRET:
        required: true
      SIGNING_CERT_HASH:
        required: true
      SIGNING_KEY:
        required: true
      KEY_ALIAS:
        required: true
      KEY_STORE_PASSWORD:
        required: true
      KEY_PASSWORD:
        required: false
      R2_ACCESS_KEY_ID:
        required: false
      R2_SECRET_ACCESS_KEY:
        required: false
      R2_ENDPOINT:
        required: false
      R2_BUCKET:
        required: false
      R2_PUBLIC_URL:
        required: false
      FCM_PROJECT_ID:
        required: false
      FCM_API_KEY:
        required: false
      FCM_SENDER_ID:
        required: false
      FCM_APPLICATION_ID:
        required: false
      SUPPORT_PHONE:
        required: false
      SUPPORT_WHATSAPP:
        required: false
      SUPPORT_EMAIL:
        required: false

jobs:
  build:
    name: Build ${{ inputs.module }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: sdkmanager "platforms;android-35" "platforms;android-34" "build-tools;34.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Validate production secrets
        env:
          HMAC_SECRET: ${{ secrets.HMAC_SECRET }}
          SIGNING_CERT_HASH: ${{ secrets.SIGNING_CERT_HASH }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
        run: |
          set -euo pipefail
          for name in HMAC_SECRET SIGNING_CERT_HASH SIGNING_KEY KEY_ALIAS KEY_STORE_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is required for a production release. Refusing to create an ephemeral signing identity."
              exit 1
            fi
          done

      - name: Prepare stable signing material
        id: signing
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          mkdir -p signing
          printf '%s' "$SIGNING_KEY" | base64 --decode > signing/release.jks
          keytool -list -keystore signing/release.jks \
            -storepass "$KEY_STORE_PASSWORD" -alias "$KEY_ALIAS" >/dev/null
          echo "alias=$KEY_ALIAS" >> "$GITHUB_OUTPUT"
          echo "store_pass=$KEY_STORE_PASSWORD" >> "$GITHUB_OUTPUT"
          echo "key_pass=${KEY_PASSWORD:-$KEY_STORE_PASSWORD}" >> "$GITHUB_OUTPUT"

      - name: Ensure Gradle wrapper
        working-directory: ${{ inputs.module }}
        run: gradle wrapper --gradle-version 8.7

      - name: Assemble release APK & AAB
        working-directory: ${{ inputs.module }}
        env:
          TB_HMAC_SECRET: ${{ secrets.HMAC_SECRET }}
          TB_SIGNING_CERT_HASH: ${{ secrets.SIGNING_CERT_HASH }}
          TB_FCM_PROJECT_ID: ${{ secrets.FCM_PROJECT_ID }}
          TB_FCM_API_KEY: ${{ secrets.FCM_API_KEY }}
          TB_FCM_SENDER_ID: ${{ secrets.FCM_SENDER_ID }}
          TB_FCM_APPLICATION_ID: ${{ secrets.FCM_APPLICATION_ID }}
          TB_SUPPORT_PHONE: ${{ secrets.SUPPORT_PHONE }}
          TB_SUPPORT_WHATSAPP: ${{ secrets.SUPPORT_WHATSAPP }}
          TB_SUPPORT_EMAIL: ${{ secrets.SUPPORT_EMAIL }}
        run: ./gradlew :app:assembleRelease :app:bundleRelease --no-daemon --stacktrace

      - name: Sign release APK & AAB
        id: sign
        env:
          BUILD_TOOLS_VERSION: "34.0.0"
          ALIAS: ${{ steps.signing.outputs.alias }}
          STORE_PASS: ${{ steps.signing.outputs.store_pass }}
          KEY_PASS: ${{ steps.signing.outputs.key_pass }}
        run: |
          set -euo pipefail
          APKSIGNER="$ANDROID_HOME/build-tools/${BUILD_TOOLS_VERSION}/apksigner"
          ZIPALIGN="$ANDROID_HOME/build-tools/${BUILD_TOOLS_VERSION}/zipalign"

          # Sign APK
          IN_APK="${{ inputs.module }}/app/build/outputs/apk/release/app-release-unsigned.apk"
          ALIGNED_APK="${{ inputs.module }}/app/build/outputs/apk/release/app-release-aligned.apk"
          OUT_APK="${{ inputs.module }}/app/build/outputs/apk/release/app-release-signed.apk"
          "$ZIPALIGN" -f -p 4 "$IN_APK" "$ALIGNED_APK"
          "$APKSIGNER" sign \
            --ks signing/release.jks \
            --ks-key-alias "$ALIAS" \
            --ks-pass "pass:$STORE_PASS" \
            --key-pass "pass:$KEY_PASS" \
            --out "$OUT_APK" "$ALIGNED_APK"
          "$APKSIGNER" verify --verbose --print-certs "$OUT_APK"

          # Sign AAB
          IN_AAB="$(ls ${{ inputs.module }}/app/build/outputs/bundle/release/*.aab)"
          OUT_AAB="${{ inputs.module }}/app/build/outputs/bundle/release/app-release-signed.aab"
          cp "$IN_AAB" "$OUT_AAB"
          jarsigner -keystore signing/release.jks \
            -storepass "$STORE_PASS" \
            -keypass "$KEY_PASS" \
            "$OUT_AAB" "$ALIAS"
          jarsigner -verify "$OUT_AAB"

          echo "file=$OUT_APK" >> "$GITHUB_OUTPUT"
          echo "aab=$OUT_AAB" >> "$GITHUB_OUTPUT"

      - name: Inspect signed APK and verify release identity
        id: apk
        env:
          EXPECTED_CERT_HASH: ${{ secrets.SIGNING_CERT_HASH }}
          BUILD_TOOLS_VERSION: "34.0.0"
        run: |
          set -euo pipefail
          APK="${{ steps.sign.outputs.file }}"
          AAPT="$ANDROID_HOME/build-tools/${BUILD_TOOLS_VERSION}/aapt"
          APKSIGNER="$ANDROID_HOME/build-tools/${BUILD_TOOLS_VERSION}/apksigner"

          BADGING="$($AAPT dump badging "$APK" | head -n 1)"
          # aapt's first line looks like:
          #   package: name='com.touchbase.user' versionCode='1' versionName='1.0.0' platformBuildVersionName='14' ...
          # Anchor each capture to the leading "package:" field and use [^']* so the
          # regex can't run past the closing quote. A greedy .*name=' would otherwise
          # latch onto platformBuildVersionName='14' and capture "14".
          PACKAGE_NAME="$(printf '%s' "$BADGING" | sed -n "s/^package: name='\([^']*\)'.*/\1/p")"
          VERSION_CODE="$(printf '%s' "$BADGING" | sed -n "s/^package: .*versionCode='\([^']*\)'.*/\1/p")"
          VERSION_NAME="$(printf '%s' "$BADGING" | sed -n "s/^package: .*versionName='\([^']*\)'.*/\1/p")"
          if [ -z "$PACKAGE_NAME" ]; then
            echo "::error::Could not parse package name from aapt badging: $BADGING"; exit 1;
          fi

          CERT_HEX="$($APKSIGNER verify --print-certs "$APK" \
            | sed -n 's/^Signer #1 certificate SHA-256 digest: //p' \
            | head -n 1 | tr -d ':' | tr '[:upper:]' '[:lower:]')"
          EXPECTED="$(printf '%s' "$EXPECTED_CERT_HASH" | tr -d ':' | tr '[:upper:]' '[:lower:]' | xargs)"
          if [ -z "$CERT_HEX" ] || [ "$CERT_HEX" != "$EXPECTED" ]; then
            echo "::error::Signed APK certificate does not match SIGNING_CERT_HASH. actual=$CERT_HEX expected=$EXPECTED"
            exit 1
          fi

          if [ "${{ inputs.module }}" = "customer-app" ]; then
            [ "$PACKAGE_NAME" = "com.touchbase.securepay.client" ] || {
              echo "::error::Customer APK package mismatch: $PACKAGE_NAME"; exit 1;
            }
            MANIFEST="$($AAPT dump xmltree "$APK" AndroidManifest.xml)"
            for action in \
              android.app.action.GET_PROVISIONING_MODE \
              android.app.action.ADMIN_POLICY_COMPLIANCE \
              android.app.action.PROVISIONING_SUCCESSFUL \
              android.app.action.DEVICE_ADMIN_ENABLED; do
              printf '%s' "$MANIFEST" | grep -F "$action" >/dev/null || {
                echo "::error::Customer APK is missing required manifest action: $action"; exit 1;
              }
            done
          fi

          APK_SHA_HEX="$(sha256sum "$APK" | awk '{print $1}')"
          APK_SHA_B64="$(printf '%s' "$APK_SHA_HEX" | xxd -r -p | base64 | tr '+/' '-_' | tr -d '=\n')"
          CERT_SHA_B64="$(printf '%s' "$CERT_HEX" | xxd -r -p | base64 | tr '+/' '-_' | tr -d '=\n')"
          SHORT_SHA="$(git rev-parse --short=7 HEAD)"

          {
            echo "package=$PACKAGE_NAME"
            echo "version_code=$VERSION_CODE"
            echo "version_name=$VERSION_NAME"
            echo "apk_sha_hex=$APK_SHA_HEX"
            echo "apk_sha_b64=$APK_SHA_B64"
            echo "cert_hex=$CERT_HEX"
            echo "cert_sha_b64=$CERT_SHA_B64"
            echo "short_sha=$SHORT_SHA"
          } >> "$GITHUB_OUTPUT"

      - name: Stage signed APK & AAB
        run: |
          set -euo pipefail
          mkdir -p staged
          cp "${{ steps.sign.outputs.file }}" \
            "staged/${{ inputs.artifact }}-${{ steps.apk.outputs.short_sha }}.apk"
          cp "${{ steps.sign.outputs.aab }}" \
            "staged/${{ inputs.artifact }}-${{ steps.apk.outputs.short_sha }}.aab"

      - name: Upload signed APK and AAB artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact }}-${{ steps.apk.outputs.short_sha }}
          path: |
            staged/${{ inputs.artifact }}-${{ steps.apk.outputs.short_sha }}.apk
            staged/${{ inputs.artifact }}-${{ steps.apk.outputs.short_sha }}.aab
          if-no-files-found: error
          retention-days: 30

      - name: Install AWS CLI for R2 publish
        if: ${{ inputs.module == 'customer-app' || inputs.module == 'agent-app' }}
        run: |
          which aws && exit 0
          curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
          unzip -q -o /tmp/awscliv2.zip -d /tmp/awscliv2
          sudo /tmp/awscliv2/aws/install --update

      - name: Publish immutable APK and manifest to R2
        if: ${{ inputs.module == 'customer-app' || inputs.module == 'agent-app' }}
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: |
          set -euo pipefail
          for name in R2_ACCESS_KEY_ID R2_SECRET_ACCESS_KEY R2_ENDPOINT R2_BUCKET R2_PUBLIC_URL; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is required to publish the APK to R2."
              exit 1
            fi
          done

          APK="staged/${{ inputs.artifact }}-${{ steps.apk.outputs.short_sha }}.apk"
          VERSION_CODE="${{ steps.apk.outputs.version_code }}"
          VERSION_NAME="${{ steps.apk.outputs.version_name }}"
          APK_SHA_HEX="${{ steps.apk.outputs.apk_sha_hex }}"
          APK_SHA_B64="${{ steps.apk.outputs.apk_sha_b64 }}"
          CERT_HEX="${{ steps.apk.outputs.cert_hex }}"
          CERT_SHA_B64="${{ steps.apk.outputs.cert_sha_b64 }}"
          if [ "${{ inputs.module }}" = "customer-app" ]; then
            APK_KEY="tb-user-v${VERSION_CODE}-${APK_SHA_HEX:0:16}.apk"
          else
            APK_KEY="tb-agent-v${VERSION_CODE}-${APK_SHA_HEX:0:16}.apk"
          fi
          PUB_URL="${R2_PUBLIC_URL%/}/${APK_KEY}"
          UPDATED_AT="$(date +%s)"

          export AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY"
          export AWS_DEFAULT_REGION="auto"

          aws s3 cp "$APK" "s3://$R2_BUCKET/$APK_KEY" \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type "application/vnd.android.package-archive" \
            --cache-control "public,max-age=31536000,immutable"

          if [ "${{ inputs.module }}" = "customer-app" ]; then
            MANIFEST="latest.json"
          else
            MANIFEST="agent-latest.json"
          fi
          cat > "$MANIFEST" <<JSON
          {
            "url": "$PUB_URL",
            "sha256Base64": "$APK_SHA_B64",
            "signatureChecksumBase64": "$CERT_SHA_B64",
            "signatureSha256Hex": "$CERT_HEX",
            "versionName": "$VERSION_NAME",
            "versionCode": $VERSION_CODE,
            "updatedAt": $UPDATED_AT
          }
          JSON

          # Publish the pointer last so the dashboard never references a partly uploaded APK.
          aws s3 cp "$MANIFEST" "s3://$R2_BUCKET/$MANIFEST" \
            --endpoint-url "$R2_ENDPOINT" \
            --content-type "application/json" \
            --cache-control "no-store,max-age=0"

          # Verify the public bytes exactly match the checksum placed in latest.json.
          curl -fL --retry 4 --retry-delay 3 "$PUB_URL" -o /tmp/published.apk
          PUBLISHED_SHA="$(sha256sum /tmp/published.apk | awk '{print $1}')"
          [ "$PUBLISHED_SHA" = "$APK_SHA_HEX" ] || {
            echo "::error::Public R2 APK checksum mismatch after upload"; exit 1;
          }
          echo "Published verified APK: $PUB_URL"
