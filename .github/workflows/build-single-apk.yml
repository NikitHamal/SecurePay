name: Build single APK

on:
  workflow_call:
    inputs:
      module:
        required: true
        type: string
      artifact:
        required: true
        type: string
    secrets:
      HMAC_SECRET:
        required: true
      SIGNING_CERT_HASH:
        required: true
      SIGNING_KEY:
        required: false
      KEY_ALIAS:
        required: false
      KEY_STORE_PASSWORD:
        required: false
      KEY_PASSWORD:
        required: false
      R2_ACCESS_KEY_ID:
        required: false
      R2_SECRET_ACCESS_KEY:
        required: false
      R2_ENDPOINT:
        required: false
      R2_BUCKET:
        required: false
      R2_PUBLIC_URL:
        required: false

jobs:
  build:
    name: Build ${{ inputs.module }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Ensure Gradle wrapper
        working-directory: ${{ inputs.module }}
        run: gradle wrapper --gradle-version 8.7

      - name: Assemble release APK
        working-directory: ${{ inputs.module }}
        env:
          HMAC_SECRET: ${{ secrets.HMAC_SECRET }}
          SIGNING_CERT_HASH: ${{ secrets.SIGNING_CERT_HASH }}
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Prepare signing material
        id: signing
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          mkdir -p signing
          if [ -n "$SIGNING_KEY" ] && [ -n "$KEY_ALIAS" ] && [ -n "$KEY_STORE_PASSWORD" ]; then
            echo "Using repository signing secrets."
            printf '%s' "$SIGNING_KEY" | base64 --decode > signing/release.jks
            ALIAS="$KEY_ALIAS"
            STORE_PASS="$KEY_STORE_PASSWORD"
            KEY_PASS="${KEY_PASSWORD:-$KEY_STORE_PASSWORD}"
          else
            echo "::warning::Signing secrets missing — generating a self-signed dev keystore for CI."
            ALIAS="securepay"
            STORE_PASS="changeit"
            KEY_PASS="changeit"
            keytool -genkeypair -v \
              -keystore signing/release.jks \
              -storepass "$STORE_PASS" -keypass "$KEY_PASS" \
              -alias "$ALIAS" -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=SecurePay CI, O=SecurePay, C=US"
          fi
          echo "alias=$ALIAS" >> "$GITHUB_OUTPUT"
          echo "store_pass=$STORE_PASS" >> "$GITHUB_OUTPUT"
          echo "key_pass=$KEY_PASS" >> "$GITHUB_OUTPUT"

      - name: Sign release APK
        env:
          BUILD_TOOLS_VERSION: "34.0.0"
          ALIAS: ${{ steps.signing.outputs.alias }}
          STORE_PASS: ${{ steps.signing.outputs.store_pass }}
          KEY_PASS: ${{ steps.signing.outputs.key_pass }}
        run: |
          set -euo pipefail
          APKSIGNER="$ANDROID_HOME/build-tools/${BUILD_TOOLS_VERSION}/apksigner"
          ZIPALIGN="$ANDROID_HOME/build-tools/${BUILD_TOOLS_VERSION}/zipalign"
          IN="${{ inputs.module }}/app/build/outputs/apk/release/app-release-unsigned.apk"
          ALIGNED="${{ inputs.module }}/app/build/outputs/apk/release/app-release-aligned.apk"
          OUT="${{ inputs.module }}/app/build/outputs/apk/release/app-release-signed.apk"
          "$ZIPALIGN" -f -p -v 4 "$IN" "$ALIGNED"
          "$APKSIGNER" sign \
            --ks signing/release.jks \
            --ks-key-alias "$ALIAS" \
            --ks-pass "pass:$STORE_PASS" \
            --key-pass "pass:$KEY_PASS" \
            --out "$OUT" "$ALIGNED"
          "$APKSIGNER" verify --verbose "$OUT"
          echo "signedReleaseFile=$OUT" >> "$GITHUB_OUTPUT"
        id: sign

      - name: Resolve short commit SHA
        id: meta
        run: echo "sha=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Rename signed APK
        run: |
          set -euo pipefail
          mkdir -p staged
          cp "${{ steps.sign.outputs.signedReleaseFile }}" \
            "staged/${{ inputs.artifact }}-${{ steps.meta.outputs.sha }}.apk"
          ls -lh staged

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact }}-${{ steps.meta.outputs.sha }}
          path: staged/${{ inputs.artifact }}-${{ steps.meta.outputs.sha }}.apk
          if-no-files-found: error
          retention-days: 14

      - name: Publish to Cloudflare R2 (customer-app only)
        if: ${{ inputs.module == 'customer-app' && env.R2_ACCESS_KEY_ID != '' }}
        id: publish
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          ALIAS: ${{ steps.signing.outputs.alias }}
          STORE_PASS: ${{ steps.signing.outputs.store_pass }}
          KEY_PASS: ${{ steps.signing.outputs.key_pass }}
        run: |
          set -euo pipefail
          if [ -z "${R2_ACCESS_KEY_ID}" ] || [ -z "${R2_SECRET_ACCESS_KEY}" ] || [ -z "${R2_ENDPOINT}" ] || [ -z "${R2_BUCKET}" ] || [ -z "${R2_PUBLIC_URL}" ]; then
            echo "::notice::R2 secrets not configured — skipping APK publish. QR provisioning will be unavailable until these secrets are set."
            exit 0
          fi

          APK="staged/${{ inputs.artifact }}-${{ steps.meta.outputs.sha }}.apk"

          # Android provisioning checksums use SHA-256 over (a) the APK bytes and
          # (b) the signing certificate, each base64url-encoded WITHOUT padding.
          # See: developer.android.com/work/manage-devices/provision-devices
          sha256_hex() { sha256sum "$1" | cut -d' ' -f1; }
          hex_to_b64url_nopad() {
            python3 -c "import sys,base64; print(base64.urlsafe_b64encode(bytes.fromhex(sys.stdin.read().strip())).decode().rstrip('='))"
          }

          APK_SHA_HEX=$(sha256_hex "$APK")
          APK_SHA_B64U=$(printf '%s' "$APK_SHA_HEX" | hex_to_b64url_nopad)

          # Derive the signing-cert SHA-256 (base64url, no pad) from the signed APK.
          APKSIGNER="$ANDROID_HOME/build-tools/34.0.0/apksigner"
          CERT_HEX=$("$APKSIGNER" verify --print-certs "$APK" \
            | grep -iE 'Signer #1 certificate SHA-256' | head -1 \
            | sed -E 's/.*SHA-256[: ]+([0-9a-fA-F:]+).*/\1/' | tr -d ': ')
          if [ -z "${CERT_HEX}" ]; then
            echo "::error::Could not extract signing certificate SHA-256 from signed APK"
            exit 1
          fi
          CERT_SHA_B64U=$(printf '%s' "$CERT_HEX" | hex_to_b64url_nopad)

          echo "APK sha256(hex)=$APK_SHA_HEX  -> checksum=$APK_SHA_B64U"
          echo "Cert sha256(hex)=$CERT_HEX   -> signature=$CERT_SHA_B64U"

          # Upload APK + manifest to R2 over its S3-compatible API.
          AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID" \
          AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY" \
          AWS_DEFAULT_REGION="auto" \
          aws s3 cp "$APK" "s3://$R2_BUCKET/tb-user-latest.apk" \
            --endpoint-url "$R2_ENDPOINT" --content-type "application/vnd.android.package-archive"

          PUB_URL="${R2_PUBLIC_URL%/}/tb-user-latest.apk"
          UPDATED_AT=$(date +%s)
          cat > latest.json <<EOF
          {
            "url": "$PUB_URL",
            "sha256Base64": "$APK_SHA_B64U",
            "signatureChecksumBase64": "$CERT_SHA_B64U",
            "versionName": "1.0.0",
            "versionCode": 1,
            "updatedAt": $UPDATED_AT
          }
          EOF

          AWS_ACCESS_KEY_ID="$R2_ACCESS_KEY_ID" \
          AWS_SECRET_ACCESS_KEY="$R2_SECRET_ACCESS_KEY" \
          AWS_DEFAULT_REGION="auto" \
          aws s3 cp latest.json "s3://$R2_BUCKET/latest.json" \
            --endpoint-url "$R2_ENDPOINT" --content-type "application/json"

          echo "Published APK to $PUB_URL"
          echo "Manifest: $(cat latest.json)"
