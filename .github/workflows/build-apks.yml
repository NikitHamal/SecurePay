name: Build & Sign SecurePay APKs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: build-apks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      customer: ${{ steps.filter.outputs.customer }}
      agent: ${{ steps.filter.outputs.agent }}
      workflow: ${{ steps.filter.outputs.workflow }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            customer:
              - 'customer-app/**'
            agent:
              - 'agent-app/**'
            workflow:
              - '.github/workflows/build-apks.yml'

  build-customer:
    name: Build customer-app
    needs: detect-changes
    if: needs.detect-changes.outputs.customer == 'true' || needs.detect-changes.outputs.workflow == 'true'
    uses: ./.github/workflows/build-single-apk.yml
    with:
      module: customer-app
      artifact: SecurePay-CustomerApp
    secrets:
      HMAC_SECRET: ${{ secrets.HMAC_SECRET }}
      SIGNING_CERT_HASH: ${{ secrets.SIGNING_CERT_HASH }}
      SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

  build-agent:
    name: Build agent-app
    needs: detect-changes
    if: needs.detect-changes.outputs.agent == 'true' || needs.detect-changes.outputs.workflow == 'true'
    uses: ./.github/workflows/build-single-apk.yml
    with:
      module: agent-app
      artifact: SecurePay-AgentApp
    secrets:
      HMAC_SECRET: ${{ secrets.HMAC_SECRET }}
      SIGNING_CERT_HASH: ${{ secrets.SIGNING_CERT_HASH }}
      SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

  bundle:
    name: Bundle release APKs
    needs: [build-customer, build-agent]
    if: always() && (needs.build-customer.result == 'success' || needs.build-agent.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve short commit SHA
        id: meta
        run: echo "sha=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Download signed APKs
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: SecurePay-*
          merge-multiple: true

      - name: Package APKs into one asset
        uses: actions/upload-artifact@v4
        with:
          name: SecurePay-Release-APKs-${{ steps.meta.outputs.sha }}
          path: dist/*.apk
          if-no-files-found: error
          retention-days: 30
