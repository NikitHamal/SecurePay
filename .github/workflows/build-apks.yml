name: Build & Sign SecurePay APKs

# Builds, signs and publishes release APKs for both native Android clients.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: build-apks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # 1-3. Parallel compile + sign. The matrix fans out so customer-app and
  #      agent-app compile concurrently on independent runners.
  # ---------------------------------------------------------------------------
  build:
    name: Build ${{ matrix.module }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: customer-app
            artifact: SecurePay-CustomerApp
          - module: agent-app
            artifact: SecurePay-AgentApp

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Environmental setup: Java 17 toolchain.
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # 1. Environmental setup: Android SDK + build tools.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # Provision Gradle 8.5 (also used to materialise the wrapper JAR).
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.5"

      # Ensure the Gradle wrapper JAR exists (it is intentionally not committed).
      - name: Ensure Gradle wrapper
        working-directory: ${{ matrix.module }}
        run: gradle wrapper --gradle-version 8.5

      # 2. Compile the release target via the Gradle wrapper.
      - name: Assemble release APK
        working-directory: ${{ matrix.module }}
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      # 3. Cryptographic signing using the secure keystore secrets.
      - name: Sign release APK
        id: sign
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: ${{ matrix.module }}/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          # Falls back to the keystore password when a distinct key password is unset.
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      # 4. Extract the short commit SHA for deterministic artifact naming.
      - name: Resolve short commit SHA
        id: meta
        run: echo "sha=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      # 4. Rename the signed binary to the required nomenclature.
      - name: Rename signed APK
        run: |
          set -euo pipefail
          mkdir -p staged
          cp "${{ steps.sign.outputs.signedReleaseFile }}" \
            "staged/${{ matrix.artifact }}-${{ steps.meta.outputs.sha }}.apk"
          ls -lh staged

      # Hand each signed binary to the bundling job.
      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-${{ steps.meta.outputs.sha }}
          path: staged/${{ matrix.artifact }}-${{ steps.meta.outputs.sha }}.apk
          if-no-files-found: error
          retention-days: 14

  # ---------------------------------------------------------------------------
  # 5. Bundle both signed APKs into a single downloadable workflow asset.
  # ---------------------------------------------------------------------------
  bundle:
    name: Bundle release APKs
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve short commit SHA
        id: meta
        run: echo "sha=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Download both signed APKs
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: SecurePay-*
          merge-multiple: true

      - name: Package both APKs into one asset
        uses: actions/upload-artifact@v4
        with:
          name: SecurePay-Release-APKs-${{ steps.meta.outputs.sha }}
          path: dist/*.apk
          if-no-files-found: error
          retention-days: 30
