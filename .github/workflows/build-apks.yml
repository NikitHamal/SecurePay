name: Build SecurePay APKs

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-release-apks:
    name: Build ${{ matrix.label }} release APK
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Customer App
            project_dir: customer-app
            artifact_key: customer
          - label: Agent App
            project_dir: agent-app
            artifact_key: agent

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configure Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Enable Gradle wrapper
        run: chmod +x gradlew
        working-directory: ${{ matrix.project_dir }}

      - name: Compile release target
        run: ./gradlew --no-daemon assembleRelease
        working-directory: ${{ matrix.project_dir }}

      - name: Upload unsigned APK for signing
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-${{ matrix.artifact_key }}-apk
          path: ${{ matrix.project_dir }}/app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: error
          retention-days: 1

  sign-and-package-apks:
    name: Sign and package APK artifacts
    runs-on: ubuntu-latest
    needs: build-release-apks

    steps:
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configure Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android signing tools
        run: sdkmanager "build-tools;35.0.0"

      - name: Download unsigned APKs
        uses: actions/download-artifact@v4
        with:
          pattern: unsigned-*-apk
          path: unsigned-apks
          merge-multiple: false

      - name: Extract commit short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Prepare signing material
        id: signing
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          DEFAULT_KEYSTORE: ${{ github.workspace }}/keystore/securepay-release.jks
        run: |
          set -euo pipefail
          mkdir -p signing
          if [ -n "$SIGNING_KEY" ] && [ -n "$KEY_ALIAS" ] && [ -n "$KEY_STORE_PASSWORD" ]; then
            echo "Using repository signing secrets."
            printf '%s' "$SIGNING_KEY" | base64 --decode > signing/release.jks
            ALIAS="$KEY_ALIAS"
            STORE_PASS="$KEY_STORE_PASSWORD"
            KEY_PASS="${KEY_PASSWORD:-$KEY_STORE_PASSWORD}"
          elif [ -f "$DEFAULT_KEYSTORE" ]; then
            echo "::warning::Signing secrets missing — using default repo keystore ($DEFAULT_KEYSTORE). Configure SIGNING_KEY/KEY_ALIAS/KEY_STORE_PASSWORD for production."
            cp "$DEFAULT_KEYSTORE" signing/release.jks
            ALIAS="securepay"
            STORE_PASS="securepayci"
            KEY_PASS="${KEY_PASSWORD:-securepayci}"
          else
            echo "::error::No signing material available: secrets empty and $DEFAULT_KEYSTORE not found."
            exit 1
          fi
          echo "alias=$ALIAS" >> "$GITHUB_OUTPUT"
          echo "store_pass=$STORE_PASS" >> "$GITHUB_OUTPUT"
          echo "key_pass=$KEY_PASS" >> "$GITHUB_OUTPUT"

      - name: Align and sign SecurePay APKs
        env:
          ALIAS: ${{ steps.signing.outputs.alias }}
          STORE_PASS: ${{ steps.signing.outputs.store_pass }}
          KEY_PASS: ${{ steps.signing.outputs.key_pass }}
        run: |
          set -euo pipefail
          mkdir -p dist aligned

          CUSTOMER_UNSIGNED="unsigned-apks/unsigned-customer-apk/app-release-unsigned.apk"
          AGENT_UNSIGNED="unsigned-apks/unsigned-agent-apk/app-release-unsigned.apk"

          zipalign -p -f 4 "$CUSTOMER_UNSIGNED" aligned/customer-release-aligned.apk
          zipalign -p -f 4 "$AGENT_UNSIGNED" aligned/agent-release-aligned.apk

          apksigner sign \
            --ks signing/release.jks \
            --ks-key-alias "$ALIAS" \
            --ks-pass "pass:$STORE_PASS" \
            --key-pass "pass:$KEY_PASS" \
            --out "dist/SecurePay-CustomerApp-${SHORT_SHA}.apk" \
            aligned/customer-release-aligned.apk

          apksigner sign \
            --ks signing/release.jks \
            --ks-key-alias "$ALIAS" \
            --ks-pass "pass:$STORE_PASS" \
            --key-pass "pass:$KEY_PASS" \
            --out "dist/SecurePay-AgentApp-${SHORT_SHA}.apk" \
            aligned/agent-release-aligned.apk

          apksigner verify --verbose "dist/SecurePay-CustomerApp-${SHORT_SHA}.apk"
          apksigner verify --verbose "dist/SecurePay-AgentApp-${SHORT_SHA}.apk"

      - name: Upload signed APK bundle
        uses: actions/upload-artifact@v4
        with:
          name: SecurePay-APKs-${{ env.SHORT_SHA }}
          path: dist/*.apk
          if-no-files-found: error
