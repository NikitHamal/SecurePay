name: Build SecurePay APKs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-android:
    name: Build ${{ matrix.display-name }} Release APK
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - display-name: Customer App
            app-path: customer-app
            artifact-name: customer-unsigned-release
          - display-name: Agent App
            app-path: agent-app
            artifact-name: agent-unsigned-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform tooling
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Build release APK
        working-directory: ${{ matrix.app-path }}
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon :app:assembleRelease

      - name: Upload unsigned APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.app-path }}/app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: error
          retention-days: 1

  sign-and-package:
    name: Sign and Package SecurePay APKs
    runs-on: ubuntu-latest
    needs: build-android

    steps:
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android signing tooling
        run: sdkmanager "build-tools;35.0.0"

      - name: Download unsigned APKs
        uses: actions/download-artifact@v4
        with:
          pattern: '*-unsigned-release'
          path: unsigned-apks
          merge-multiple: false

      - name: Resolve short commit SHA
        id: sha
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Prepare signing material
        id: signing
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          DEFAULT_KEYSTORE: ${{ github.workspace }}/keystore/securepay-release.jks
        run: |
          set -euo pipefail
          mkdir -p signing
          if [ -n "$SIGNING_KEY" ] && [ -n "$KEY_ALIAS" ] && [ -n "$KEY_STORE_PASSWORD" ]; then
            echo "Using repository signing secrets."
            printf '%s' "$SIGNING_KEY" | base64 --decode > signing/release.jks
            ALIAS="$KEY_ALIAS"
            STORE_PASS="$KEY_STORE_PASSWORD"
            KEY_PASS="${KEY_PASSWORD:-$KEY_STORE_PASSWORD}"
          elif [ -f "$DEFAULT_KEYSTORE" ]; then
            echo "::warning::Signing secrets missing — using default repo keystore ($DEFAULT_KEYSTORE). Configure SIGNING_KEY/KEY_ALIAS/KEY_STORE_PASSWORD for production."
            cp "$DEFAULT_KEYSTORE" signing/release.jks
            ALIAS="securepay"
            STORE_PASS="securepayci"
            KEY_PASS="${KEY_PASSWORD:-securepayci}"
          else
            echo "::error::No signing material available: secrets empty and $DEFAULT_KEYSTORE not found."
            exit 1
          fi
          echo "alias=$ALIAS" >> "$GITHUB_OUTPUT"
          echo "store_pass=$STORE_PASS" >> "$GITHUB_OUTPUT"
          echo "key_pass=$KEY_PASS" >> "$GITHUB_OUTPUT"

      - name: Sign and rename APKs
        env:
          ALIAS: ${{ steps.signing.outputs.alias }}
          STORE_PASS: ${{ steps.signing.outputs.store_pass }}
          KEY_PASS: ${{ steps.signing.outputs.key_pass }}
        run: |
          set -euo pipefail
          mkdir -p signed-apks
          APKSIGNER="$ANDROID_HOME/build-tools/35.0.0/apksigner"

          "$APKSIGNER" sign \
            --ks signing/release.jks \
            --ks-key-alias "$ALIAS" \
            --ks-pass "pass:$STORE_PASS" \
            --key-pass "pass:$KEY_PASS" \
            --out "signed-apks/SecurePay-CustomerApp-${{ steps.sha.outputs.short_sha }}.apk" \
            unsigned-apks/customer-unsigned-release/app-release-unsigned.apk

          "$APKSIGNER" sign \
            --ks signing/release.jks \
            --ks-key-alias "$ALIAS" \
            --ks-pass "pass:$STORE_PASS" \
            --key-pass "pass:$KEY_PASS" \
            --out "signed-apks/SecurePay-AgentApp-${{ steps.sha.outputs.short_sha }}.apk" \
            unsigned-apks/agent-unsigned-release/app-release-unsigned.apk

          "$APKSIGNER" verify --verbose "signed-apks/SecurePay-CustomerApp-${{ steps.sha.outputs.short_sha }}.apk"
          "$APKSIGNER" verify --verbose "signed-apks/SecurePay-AgentApp-${{ steps.sha.outputs.short_sha }}.apk"

      - name: Upload signed APK bundle
        uses: actions/upload-artifact@v4
        with:
          name: SecurePay-Signed-APKs-${{ steps.sha.outputs.short_sha }}
          path: signed-apks/*.apk
          if-no-files-found: error
