name: Build & Sign SecurePay APKs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_target:
        description: 'Which apps to build'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - customer-app
          - agent-app

permissions:
  contents: read

concurrency:
  group: build-apks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect changed apps
    runs-on: ubuntu-latest
    outputs:
      customer: ${{ steps.merge.outputs.customer }}
      agent: ${{ steps.merge.outputs.agent }}
      workflow: ${{ steps.filter.outputs.workflow }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            customer:
              - 'customer-app/**'
            agent:
              - 'agent-app/**'
            workflow:
              - '.github/workflows/build-apks.yml'

      - name: Override for manual dispatch
        if: github.event_name == 'workflow_dispatch'
        id: dispatch
        run: |
          TARGET="${{ inputs.build_target }}"
          case "$TARGET" in
            both)          echo "customer=true" >> "$GITHUB_OUTPUT"; echo "agent=true" >> "$GITHUB_OUTPUT" ;;
            customer-app) echo "customer=true" >> "$GITHUB_OUTPUT"; echo "agent=false" >> "$GITHUB_OUTPUT" ;;
            agent-app)    echo "customer=false" >> "$GITHUB_OUTPUT"; echo "agent=true" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Merge filter + dispatch outputs
        id: merge
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "customer=${{ steps.dispatch.outputs.customer }}" >> "$GITHUB_OUTPUT"
            echo "agent=${{ steps.dispatch.outputs.agent }}" >> "$GITHUB_OUTPUT"
          else
            echo "customer=${{ steps.filter.outputs.customer }}" >> "$GITHUB_OUTPUT"
            echo "agent=${{ steps.filter.outputs.agent }}" >> "$GITHUB_OUTPUT"
          fi

  build-customer:
    name: Build customer-app
    needs: detect-changes
    if: needs.detect-changes.outputs.customer == 'true' || needs.detect-changes.outputs.workflow == 'true'
    uses: ./.github/workflows/build-single-apk.yml
    with:
      module: customer-app
      artifact: SecurePay-CustomerApp
    secrets:
      HMAC_SECRET: ${{ secrets.HMAC_SECRET }}
      SIGNING_CERT_HASH: ${{ secrets.SIGNING_CERT_HASH }}
      SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}

  build-agent:
    name: Build agent-app
    needs: detect-changes
    if: needs.detect-changes.outputs.agent == 'true' || needs.detect-changes.outputs.workflow == 'true'
    uses: ./.github/workflows/build-single-apk.yml
    with:
      module: agent-app
      artifact: SecurePay-AgentApp
    secrets:
      HMAC_SECRET: ${{ secrets.HMAC_SECRET }}
      SIGNING_CERT_HASH: ${{ secrets.SIGNING_CERT_HASH }}
      SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}

  bundle:
    name: Bundle release APKs
    needs: [build-customer, build-agent]
    if: always() && (needs.build-customer.result == 'success' || needs.build-agent.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve short commit SHA
        id: meta
        run: echo "sha=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Download signed APKs
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: SecurePay-*
          merge-multiple: true

      - name: Package APKs into one asset
        uses: actions/upload-artifact@v4
        with:
          name: SecurePay-Release-APKs-${{ steps.meta.outputs.sha }}
          path: dist/*.apk
          if-no-files-found: error
          retention-days: 30
